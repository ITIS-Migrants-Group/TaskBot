services:
  documentation-postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${DOCUMENTATION_POSTGRES_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: ${DOCUMENTATION_DB_NAME:-documentation_db}
      POSTGRES_USER: ${DOCUMENTATION_DB_USER:-documentation_user}
      POSTGRES_PASSWORD: ${DOCUMENTATION_DB_PASSWORD:-documentation_password}
    volumes:
      - documentation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  documentation-service:
    build:
      context: ..
      dockerfile: documentation-service/Dockerfile
    restart: unless-stopped
    depends_on:
      documentation-postgres:
        condition: service_healthy
    ports:
      - "${DOCUMENTATION_SERVICE_PORT:-8084}:8084"
    environment:
      DOCUMENTATION_DB_URL: jdbc:postgresql://documentation-postgres:5432/${DOCUMENTATION_DB_NAME:-documentation_db}
      DOCUMENTATION_DB_USER: ${DOCUMENTATION_DB_USER:-documentation_user}
      DOCUMENTATION_DB_PASSWORD: ${DOCUMENTATION_DB_PASSWORD:-documentation_password}

volumes:
  documentation_postgres_data:
